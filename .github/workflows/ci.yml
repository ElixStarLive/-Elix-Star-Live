name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Dockerfile uses `npm install` (lockfile may drift), so mirror that here.
      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
