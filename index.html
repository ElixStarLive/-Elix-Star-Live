<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/elix-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0B0B0F" />
    <meta name="format-detection" content="telephone=no" />
    <title>Elix Star Live v1.5</title>
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded =
            l.search
              .slice(1)
              .split('&')
              .map(function (s) {
                return s.replace(/~and~/g, '&');
              })
              .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script src="/env.js"></script>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFE08A"/>
          <stop offset="25%" stop-color="#D4A017"/>
          <stop offset="50%" stop-color="#C9A96E"/>
          <stop offset="75%" stop-color="#D4A017"/>
          <stop offset="100%" stop-color="#FFE08A"/>
        </linearGradient>
      </defs>
    </svg>
    <div id="root"></div>
    <div id="app-splash" style="position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:#0B0B0F;flex-direction:column;gap:16px;transition:opacity 0.3s ease-out">
      <img src="/elix-logo.png" alt="" width="140" height="140" style="animation:pulse 1.5s ease-in-out infinite" />
      <div style="width:40px;height:40px;border:2px solid #C9A96E;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:8px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(.95)}}</style>
    </div>
    <script>
      window.addEventListener('DOMContentLoaded',function(){
        var t=setTimeout(removeSplash,5000);
        var o=new MutationObserver(function(){
          if(document.getElementById('root')&&document.getElementById('root').children.length>0){
            removeSplash();o.disconnect();
          }
        });
        o.observe(document.getElementById('root'),{childList:true});
        function removeSplash(){
          clearTimeout(t);
          var s=document.getElementById('app-splash');
          if(s){s.style.opacity='0';setTimeout(function(){s.remove()},300)}
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
