version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: elix-star-live:latest
    expose:
      - "8080"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379}
      JWT_SECRET: ${JWT_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      BUNNY_STORAGE_API_KEY: ${BUNNY_STORAGE_API_KEY:-}
      BUNNY_STORAGE_ZONE: ${BUNNY_STORAGE_ZONE:-}
      BUNNY_STORAGE_HOSTNAME: ${BUNNY_STORAGE_HOSTNAME:-}
      BUNNY_STORAGE_REGION: ${BUNNY_STORAGE_REGION:-}
      BUNNY_CDN_HOSTNAME: ${BUNNY_CDN_HOSTNAME:-}
      BUNNY_LIBRARY_ID: ${BUNNY_LIBRARY_ID:-}
      BUNNY_LIBRARY_API_KEY: ${BUNNY_LIBRARY_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CLIENT_URL: ${CLIENT_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  valkey_data:
